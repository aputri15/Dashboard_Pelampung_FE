<!DOCTYPE html>
<html lang="id" data-theme="light" class="bg-bgMain text-textMain">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Riwayat Log Upload | BI Pelampung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/api.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgMain: '#F8FAFC',
            surface: '#FFFFFF',
            borderMain: '#E2E8F0',
            textMain: '#1E293B',
            textSub: '#475569',
            textMuted: '#94A3B8',
            primary: '#F5821F',
            success: '#22C55E',
            danger: '#EF4444',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex bg-bgMain font-sans" style="font-family:'Inter',sans-serif;">

  <!-- Mobile Overlay -->
  <div id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="adminSidebar"
    class="w-64 bg-surface border-r border-borderMain flex flex-col fixed h-screen z-40 shadow-sm">
    <div class="p-6 flex items-center gap-3 border-b border-borderMain">
      <div class="w-10 h-10 bg-[#F5821F] rounded-xl flex items-center justify-center shadow-md">
        <i data-lucide="shield" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="text-base font-bold text-textMain tracking-tight">Admin Panel</h1>
        <p class="text-xs text-textMuted">BI Pelampung</p>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a href="upload.html"
        class="sidebar-link sidebar-link-upload flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-textSub">
        <i data-lucide="upload-cloud" class="w-5 h-5"></i>
        <span>Upload Data</span>
      </a>
      <a href="kelola.html"
        class="sidebar-link sidebar-link-kelola flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-textSub">
        <i data-lucide="database" class="w-5 h-5"></i>
        <span>Kelola Data</span>
      </a>
      <a href="log.html"
        class="sidebar-link sidebar-link-log active flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium">
        <i data-lucide="history" class="w-5 h-5"></i>
        <span>Riwayat Log Upload</span>
      </a>
      <a href="akun.html"
        class="sidebar-link sidebar-link-akun flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-textSub">
        <i data-lucide="users" class="w-5 h-5"></i>
        <span>Manajemen Akun</span>
      </a>
    </nav>

    <div class="p-4 border-t border-borderMain">
      <button type="button" onclick="logout()"
        class="w-full flex items-center justify-center gap-2 px-4 py-3 text-textSub hover:bg-red-50 hover:text-danger rounded-xl transition-all border border-transparent hover:border-red-200 font-medium">
        <i data-lucide="log-out" class="w-5 h-5"></i>
        Logout
      </button>
    </div>
  </aside>

  <!-- Mobile Top Bar -->
  <div
    class="md:hidden fixed top-0 left-0 right-0 z-30 bg-surface border-b border-borderMain px-4 py-3 flex items-center gap-3 shadow-sm">
    <button class="hamburger-btn" onclick="openSidebar()" style="display:flex">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <span class="text-base font-bold text-textMain">Admin Panel</span>
  </div>

  <!-- Main Content -->
  <main id="adminMainContent" class="md:ml-64 flex-1 p-4 sm:p-8 pt-20 md:pt-8">
    <div class="max-w-[1200px] mx-auto">

      <div class="mb-8 flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-bold text-textMain tracking-tight">Riwayat Log Upload</h2>
          <p class="text-textSub mt-1">Lacak history perubahan dan upload data oleh sistem.</p>
        </div>
        <button onclick="loadLogs()"
          class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-borderMain text-textSub hover:bg-bgMain hover:text-textMain transition-all text-sm font-medium">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Muat Ulang
        </button>
      </div>

      <div class="glass-panel p-3 sm:p-4 mb-6">
        <div class="grid grid-cols-1 lg:grid-cols-[1fr_auto_auto_auto_auto] gap-3 items-center">
          <div class="relative">
            <i data-lucide="search" class="w-5 h-5 text-textMuted absolute left-4 top-1/2 -translate-y-1/2"></i>
            <input type="text" id="searchLog" placeholder="Cari nama file..."
              class="w-full pl-12 pr-4 py-3 bg-bgMain border border-borderMain rounded-xl text-sm text-textMain focus:ring-2 focus:ring-[#F5821F] focus:outline-none transition-all">
          </div>
          <select id="filterLogBulan" class="px-4 py-3 bg-bgMain border border-borderMain rounded-xl text-sm text-textMain">
            <option value="">Semua Bulan</option>
          </select>
          <select id="filterLogTahun" class="px-4 py-3 bg-bgMain border border-borderMain rounded-xl text-sm text-textMain">
            <option value="">Semua Tahun</option>
          </select>
          <select id="filterLogStatus" class="px-4 py-3 bg-bgMain border border-borderMain rounded-xl text-sm text-textMain">
            <option value="">Semua Status</option>
            <option value="Sukses">Sukses</option>
            <option value="Gagal">Gagal</option>
          </select>
          <button onclick="resetLogFilters()"
            class="px-4 py-3 rounded-xl border border-borderMain text-textSub hover:bg-bgMain hover:text-textMain transition-colors text-sm font-medium">
            Reset
          </button>
        </div>
        <div id="logTotalSummary" class="mt-3 text-sm text-textSub">Total: 0 log</div>
      </div>

      <!-- Data Table -->
      <div class="glass-panel overflow-hidden">
        <div class="overflow-x-auto">
          <table class="table w-full text-sm">
            <thead class="bg-bgMain text-textMuted border-b border-borderMain">
              <tr>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">No.</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">Tanggal Upload</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">Nama File</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Jml Baris</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Status</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">User</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Aksi</th>
              </tr>
            </thead>
            <tbody id="logsTableBody" class="text-textMain divide-y divide-borderMain">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="p-5 border-t border-borderMain flex items-center justify-between text-sm text-textSub bg-bgMain/50">
          <div id="logPaginationInfo">Menampilkan 0 log</div>
          <div class="flex gap-1">
            <button id="btnLogPrev" class="px-3 py-1.5 rounded-lg border border-borderMain text-textSub hover:bg-bgMain transition-all text-sm font-medium">Sebelumnya</button>
            <span id="logPageIndicator" class="px-4 py-1.5 rounded-lg bg-[#F5821F] text-white text-sm font-bold pointer-events-none">1</span>
            <button id="btnLogNext" class="px-3 py-1.5 rounded-lg border border-borderMain text-textSub hover:bg-bgMain transition-all text-sm font-medium">Selanjutnya</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    requireAuth(['admin']);
    lucide.createIcons();

    function openSidebar() {
      document.getElementById('adminSidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('active');
    }
    function closeSidebar() {
      document.getElementById('adminSidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    }

    let currentLogPage = 1;
    const logsPerPage = 15;
    let logSearchTimer = null;
    const bulanLabels = {
      '01': 'Januari', '02': 'Februari', '03': 'Maret', '04': 'April',
      '05': 'Mei', '06': 'Juni', '07': 'Juli', '08': 'Agustus',
      '09': 'September', '10': 'Oktober', '11': 'November', '12': 'Desember'
    };

    async function loadLogFilterOptions() {
      const res = await apiFetch('/transaksi/log/upload-filter-options');
      if (!res || !res.ok) return;
      const options = await res.json();

      const bulanSelect = document.getElementById('filterLogBulan');
      options.bulan.forEach(bulan => {
        const opt = document.createElement('option');
        opt.value = bulan;
        opt.textContent = bulanLabels[bulan] || bulan;
        bulanSelect.appendChild(opt);
      });

      const tahunSelect = document.getElementById('filterLogTahun');
      options.tahun.forEach(tahun => {
        const opt = document.createElement('option');
        opt.value = tahun;
        opt.textContent = tahun;
        tahunSelect.appendChild(opt);
      });
    }

    async function loadLogs() {
      const tbody = document.getElementById('logsTableBody');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8"><span class="loading loading-spinner text-primary"></span></td></tr>';

      const params = new URLSearchParams({ page: currentLogPage, per_page: logsPerPage });
      const search = document.getElementById('searchLog').value;
      const bulan = document.getElementById('filterLogBulan').value;
      const tahun = document.getElementById('filterLogTahun').value;
      const status = document.getElementById('filterLogStatus').value;
      if (search) params.set('search', search);
      if (bulan) params.set('bulan', bulan);
      if (tahun) params.set('tahun', tahun);
      if (status) params.set('status', status);

      const res = await apiFetch(`/transaksi/log/uploads?${params.toString()}`);
      if (!res) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-danger">Gagal memuat data.</td></tr>';
        return;
      }

      const payload = await res.json();
      const logs = payload.data;
      const total = payload.total;
      const page = payload.page;

      document.getElementById('logTotalSummary').textContent = `Total: ${total.toLocaleString('id-ID')} log`;
      document.getElementById('logPaginationInfo').innerHTML = `Menampilkan <span class="text-textMain font-medium">${logs.length > 0 ? (page - 1) * logsPerPage + 1 : 0}-${(page - 1) * logsPerPage + logs.length}</span> dari <span class="text-textMain font-medium">${total}</span> log`;
      document.getElementById('logPageIndicator').textContent = page;
      document.getElementById('btnLogPrev').disabled = page <= 1;
      document.getElementById('btnLogNext').disabled = page * logsPerPage >= total;

      if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-textMuted">Belum ada history upload.</td></tr>';
        return;
      }

      tbody.innerHTML = logs.map((l, index) => {
        let statusBadge = '';
        if (l.status === 'Sukses') {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-success/10 text-success text-xs font-medium border border-success/20"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Sukses</div>';
        } else if (l.status === 'Berhasil' || l.status === 'Parsial') {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-success/10 text-success text-xs font-medium border border-success/20"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Berhasil</div>';
        } else {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-danger/10 text-danger text-xs font-medium border border-danger/20"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Gagal</div>';
        }

        return `
          <tr class="hover:bg-bgMain/30 transition-colors group">
            <td class="px-6 py-4 font-medium text-textSub">${(page - 1) * logsPerPage + index + 1}</td>
            <td class="px-6 py-4 text-textSub">${l.tanggal}</td>
            <td class="px-6 py-4 font-mono text-xs text-primary">${l.nama_file}</td>
            <td class="px-6 py-4 text-center font-medium">${l.jumlah_baris}</td>
            <td class="px-6 py-4 text-center">${statusBadge}</td>
            <td class="px-6 py-4 text-textSub">
              <span class="inline-flex items-center gap-1.5 px-2 py-1 bg-surface rounded text-xs border border-borderMain">
                <i data-lucide="user" class="w-3 h-3"></i> ${l.uploaded_by}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <button onclick="deleteLog(${l.id})" class="btn btn-xs btn-ghost text-danger hover:bg-danger/10 opacity-0 group-hover:opacity-100 transition-opacity">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');

      lucide.createIcons();
    }

    function resetLogFilters() {
      document.getElementById('searchLog').value = '';
      document.getElementById('filterLogBulan').value = '';
      document.getElementById('filterLogTahun').value = '';
      document.getElementById('filterLogStatus').value = '';
      currentLogPage = 1;
      loadLogs();
    }

    async function deleteLog(id) {
      if (!confirm('Hapus log ini?')) return;
      const res = await apiFetch(`/transaksi/log/uploads/${id}`, { method: 'DELETE' });
      if (res && res.ok) {
        loadLogs();
      } else {
        alert('Gagal menghapus log');
      }
    }

    document.getElementById('searchLog').addEventListener('input', () => {
      clearTimeout(logSearchTimer);
      logSearchTimer = setTimeout(() => { currentLogPage = 1; loadLogs(); }, 400);
    });
    ['filterLogBulan', 'filterLogTahun', 'filterLogStatus'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        currentLogPage = 1;
        loadLogs();
      });
    });
    document.getElementById('btnLogPrev').addEventListener('click', () => {
      if (currentLogPage > 1) { currentLogPage--; loadLogs(); }
    });
    document.getElementById('btnLogNext').addEventListener('click', () => {
      currentLogPage++;
      loadLogs();
    });

    // Init
    loadLogFilterOptions().then(loadLogs);
  </script>
</body>

</html>
