<!DOCTYPE html>
<html lang="id" data-theme="dark" class="bg-bgMain text-textMain">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Log Upload | BI Pelampung</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/api.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgMain: '#0F172A',
            surface: '#1E293B',
            borderMain: '#334155',
            textMain: '#F1F5F9',
            textSub: '#CBD5E1',
            textMuted: '#64748B',
            primary: '#3B82F6',
            success: '#22C55E',
            danger: '#EF4444',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex bg-bgMain font-sans selection:bg-primary/30">

  <!-- Sidebar -->
  <aside class="w-64 bg-surface border-r border-borderMain flex flex-col fixed h-screen z-20 shadow-xl">
    <div class="p-6 flex items-center gap-3 border-b border-borderMain">
      <div class="w-10 h-10 bg-gradient-to-br from-primary to-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
        <i data-lucide="shield" class="w-6 h-6 text-white"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-textMain tracking-tight">Admin Panel</h1>
        <p class="text-xs text-textSub">BI Pelampung</p>
      </div>
    </div>
    
    <nav class="flex-1 p-4 space-y-2">
      <a href="upload.html" class="sidebar-link relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"></div>
        <i data-lucide="upload-cloud" class="w-5 h-5 relative z-10"></i>
        <span class="relative z-10">Upload Data</span>
      </a>
      <a href="kelola.html" class="sidebar-link relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"></div>
        <i data-lucide="database" class="w-5 h-5 relative z-10"></i>
        <span class="relative z-10">Kelola Data</span>
      </a>
      <a href="log.html" class="sidebar-link active relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"></div>
        <i data-lucide="history" class="w-5 h-5 relative z-10"></i>
        <span class="relative z-10">Log Upload</span>
      </a>
      <a href="akun.html" class="sidebar-link relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"></div>
        <i data-lucide="users" class="w-5 h-5 relative z-10"></i>
        <span class="relative z-10">Manajemen Akun</span>
      </a>
    </nav>
    
    <div class="p-4 border-t border-borderMain">
      <button type="button" onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-textSub hover:bg-danger/10 hover:text-danger rounded-xl transition-all border border-transparent hover:border-danger/30 font-medium">
        <i data-lucide="log-out" class="w-5 h-5"></i>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 p-8">
    <div class="max-w-[1200px] mx-auto">
      
      <div class="mb-8 flex justify-between items-center">
        <div>
          <h2 class="text-3xl font-bold text-textMain tracking-tight">Riwayat Log Upload</h2>
          <p class="text-textSub mt-1">Lacak history perubahan dan upload data oleh sistem.</p>
        </div>
        <button onclick="loadLogs()" class="btn btn-ghost hover:bg-surface text-textSub hover:text-textMain rounded-xl px-4 flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Muat Ulang
        </button>
      </div>

      <!-- Data Table -->
      <div class="glass-panel overflow-hidden">
        <div class="overflow-x-auto">
          <table class="table w-full text-sm">
            <thead class="bg-bgMain/50 text-textSub border-b border-borderMain">
              <tr>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">No.</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">Tanggal Upload</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">Nama File</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Jml Baris</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Status</th>
                <th class="py-4 px-6 uppercase tracking-wider text-xs font-semibold">User</th>
                <th class="py-4 px-6 text-center uppercase tracking-wider text-xs font-semibold">Aksi</th>
              </tr>
            </thead>
            <tbody id="logsTableBody" class="text-textMain divide-y divide-borderMain">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    requireAuth(['admin']);
    lucide.createIcons();

    async function loadLogs() {
      const tbody = document.getElementById('logsTableBody');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8"><span class="loading loading-spinner text-primary"></span></td></tr>';
      
      const res = await apiFetch('/transaksi/log/uploads');
      if (!res) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-danger">Gagal memuat data.</td></tr>';
        return;
      }
      
      const logs = await res.json();
      
      if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-textMuted">Belum ada history upload.</td></tr>';
        return;
      }

      tbody.innerHTML = logs.map((l, index) => {
        let statusBadge = '';
        if (l.status === 'Sukses') {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-success/10 text-success text-xs font-medium border border-success/20"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Sukses</div>';
        } else if (l.status === 'Parsial') {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-yellow-500/10 text-yellow-500 text-xs font-medium border border-yellow-500/20"><i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> Parsial</div>';
        } else {
          statusBadge = '<div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-danger/10 text-danger text-xs font-medium border border-danger/20"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Gagal</div>';
        }

        return `
          <tr class="hover:bg-bgMain/30 transition-colors group">
            <td class="px-6 py-4 font-medium text-textSub">${index + 1}</td>
            <td class="px-6 py-4 text-textSub">${l.tanggal}</td>
            <td class="px-6 py-4 font-mono text-xs text-primary">${l.nama_file}</td>
            <td class="px-6 py-4 text-center font-medium">${l.jumlah_baris}</td>
            <td class="px-6 py-4 text-center">${statusBadge}</td>
            <td class="px-6 py-4 text-textSub">
              <span class="inline-flex items-center gap-1.5 px-2 py-1 bg-surface rounded text-xs border border-borderMain">
                <i data-lucide="user" class="w-3 h-3"></i> ${l.uploaded_by}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <button onclick="deleteLog(${l.id})" class="btn btn-xs btn-ghost text-danger hover:bg-danger/10 opacity-0 group-hover:opacity-100 transition-opacity">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </td>
          </tr>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    async function deleteLog(id) {
      if(!confirm('Hapus log ini?')) return;
      const res = await apiFetch(`/transaksi/log/uploads/${id}`, { method: 'DELETE' });
      if (res && res.ok) {
        loadLogs();
      } else {
        alert('Gagal menghapus log');
      }
    }

    // Init
    loadLogs();
  </script>
</body>
</html>
